# CUDA variant configuration for candle-vllm
# CUDA 12.8 + 13.1 only (skip 13.0 — 13.1 is backward-compatible via cuda-compat)
# No GCC pinning needed — CUDA 12.8+ supports GCC 14

gpu_variant:
  - none
  - cuda-12    # [linux]
  - cuda-13    # [linux]

cuda_compiler_version:         # [linux]
  - none                       # [linux]
  - 12.8                       # [linux]
  - 13.1                       # [linux]

zip_keys:                      # [linux]
  -                            # [linux]
    - gpu_variant              # [linux]
    - cuda_compiler_version    # [linux]
