anaconda_config_version: 1
upstream_sources:
  # Crate semver from Cargo.toml on master (upstream ships commit pins in-recipe; nvchecker tracks semver signal).
  # Matches aggregate-duct-tape ``NVCHECKER_OVERRIDE_GITHUB_TO_REGEX`` / distro-db ``github->webpage(regex)``.
  - webpage:
      url: https://raw.githubusercontent.com/EricLBuehler/candle-vllm/master/Cargo.toml
      regex: '(?m)^version\s*=\s*"([^"]+)"\s*$'
